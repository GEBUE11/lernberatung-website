# ── SCHRITT 1: Nur HTTP (vor der SSL-Einrichtung aktiv) ──────────────────────
# Nach SSL-Einrichtung diesen Block durch den HTTPS-Block unten ersetzen.

server {
    listen 80;
    server_name lernberatung-buechner.de www.lernberatung-buechner.de;

    root /usr/share/nginx/html;
    index index.html;

    # Let's Encrypt Challenge (wird für SSL-Einrichtung benötigt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alle anderen Anfragen auf index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}


