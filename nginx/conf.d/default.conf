server_tokens off;

server {
    listen 80;
    server_name lernberatung-buechner.de www.lernberatung-buechner.de srv825520.hstgr.cloud;

    root /usr/share/nginx/html;
    index index.html;

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # .git und .env sperren
    location ~ /\.git {
        deny all;
        return 404;
    }
    location ~ /\.env {
        deny all;
        return 404;
    }
    # Alle versteckten Dateien sperren
    location ~ /\. {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
