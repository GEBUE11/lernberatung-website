services:

  nginx:
    image: nginx:alpine
    container_name: lernberatung-nginx
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
    labels:
      # Traefik aktivieren
      - "traefik.enable=true"
      # HTTPS-Router
      - "traefik.http.routers.lernberatung.rule=Host(`srv825520.hstgr.cloud`)"
      - "traefik.http.routers.lernberatung.entrypoints=websecure"
      - "traefik.http.routers.lernberatung.tls.certresolver=myresolver"
      - "traefik.http.services.lernberatung.loadbalancer.server.port=80"
      # HTTP → HTTPS Weiterleitung
      - "traefik.http.routers.lernberatung-http.rule=Host(`srv825520.hstgr.cloud`)"
      - "traefik.http.routers.lernberatung-http.entrypoints=web"
      - "traefik.http.routers.lernberatung-http.middlewares=lernberatung-https"
      - "traefik.http.middlewares.lernberatung-https.redirectscheme.scheme=https"
    networks:
      - traefik

networks:
  traefik:
    external: true
